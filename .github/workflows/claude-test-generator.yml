name: Claude Test Generator

on:
  push:
    branches: [ main ]
    paths:
      - 'fastapi-app/**/*.py'
      - '!fastapi-app/tests/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'fastapi-app/**/*.py'
      - '!fastapi-app/tests/**'

jobs:
  generate-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Get changed Python files
        run: |
          git diff --name-only HEAD~1 HEAD -- 'fastapi-app/**/*.py' \
            | grep -v 'fastapi-app/tests/' \
            | grep -v '__pycache__' \
            > changed_files.txt || true
          cat changed_files.txt

      - name: Generate test code with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_tests.py

      - name: Upload generated tests as artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-tests
          path: fastapi-app/tests/test_*_generated.py
          if-no-files-found: ignore

      - name: Commit and push generated tests
        run: |
          git config user.name "claude-bot"
          git config user.email "claude-bot@anthropic.com"
          git add fastapi-app/tests/test_*_generated.py 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "변경사항 없음"
          else
            git commit -m "🤖 Claude가 테스트 코드 자동 생성"
            git push
          fi